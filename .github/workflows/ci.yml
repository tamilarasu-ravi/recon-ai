name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cfo_capstone
  LLM_ENABLE_LIVE_CALLS: "false"
  LANGGRAPH_CHECKPOINTER: memory
  AUTO_TAG_HITL_ENABLED: "false"
  REQUIRE_API_AUTH: "false"

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cfo_capstone
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cfo_capstone"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Migrate database
        run: pnpm db:migrate

      - name: Seed database
        run: pnpm db:seed

      - name: Unit tests
        run: pnpm test

      - name: Tagging eval (deterministic)
        run: pnpm eval:tagging

      - name: Production build
        run: pnpm build

      - name: Production config (advisory)
        run: pnpm production:check
